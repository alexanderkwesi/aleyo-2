services:
  - type: web
    name: aleyo-backend
    runtime: python
    buildCommand: |
    pip install --upgrade pip
    pip install --upgrade -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aleyo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # Add other env vars...

databases:
  - name: aleyo-db
    plan: starter
    databaseName: aleyo
    user: aleyo_user
